<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spendenaktion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Logo oben rechts -->
  <img src="logo.png" class="logo">

  <div class="container">
    <h1>Spendenaktion</h1>

    <div id="amount">0 CHF</div>

    <div class="buttons">
      <button onclick="changeAmount(5)">+5 CHF</button>
      <button onclick="changeAmount(-5)">-5 CHF</button>
      <button onclick="resetAmount()">Reset</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
